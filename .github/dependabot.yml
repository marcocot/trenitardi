version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "livewire/*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    groups:
      vite-ecosystem:
        patterns:
          - "vite"
          - "laravel-vite-plugin"
          - "@tailwindcss/*"
          - "tailwindcss"
