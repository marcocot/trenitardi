<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1e3a5f"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="32" height="32" rx="7" fill="url(#bg)"/>
    <!-- Train body -->
    <rect x="5" y="14" width="18" height="9" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <!-- Train windows -->
    <rect x="7" y="16" width="3.5" height="3" rx="0.8" fill="#93c5fd"/>
    <rect x="12" y="16" width="3.5" height="3" rx="0.8" fill="#93c5fd"/>
    <!-- Train front -->
    <path d="M23 15.5 L27 17 L27 22 L23 23 Z" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Wheels -->
    <circle cx="9" cy="24.5" r="1.8" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
    <circle cx="17" cy="24.5" r="1.8" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
    <!-- Tracks -->
    <line x1="3" y1="27" x2="29" y2="27" stroke="#334155" stroke-width="1.2"/>
    <!-- Delay badge (red clock) -->
    <circle cx="24" cy="9" r="6" fill="#0f172a"/>
    <circle cx="24" cy="9" r="5.5" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    <line x1="24" y1="9" x2="24" y2="5.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="24" y1="9" x2="27" y2="11" stroke="#f87171" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="24" cy="9" r="0.9" fill="white"/>
</svg>
